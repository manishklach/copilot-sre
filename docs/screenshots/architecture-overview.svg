<svg width="1400" height="760" viewBox="0 0 1400 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Copilot SRE architecture overview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="760" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#07111F"/>
      <stop offset="1" stop-color="#0E233B"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="280" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#122843"/>
      <stop offset="1" stop-color="#0C1C31"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="220" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#67F0C1"/>
      <stop offset="1" stop-color="#74B9FF"/>
    </linearGradient>
    <filter id="shadow" x="-30" y="-30" width="360" height="220" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#82DAF3"/>
    </marker>
  </defs>

  <rect width="1400" height="760" rx="28" fill="url(#bg)"/>

  <text x="72" y="92" fill="#ECF5FF" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="700">Copilot SRE Architecture</text>
  <text x="72" y="132" fill="#97B3D1" font-family="Arial, Helvetica, sans-serif" font-size="24">Assemble incident context first, then hand a structured brief to Copilot CLI</text>

  <g filter="url(#shadow)">
    <rect x="70" y="200" width="250" height="170" rx="24" fill="url(#card)" stroke="#3E6B91" stroke-width="2"/>
    <text x="96" y="240" fill="#67F0C1" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">1. INCIDENT INPUT</text>
    <text x="96" y="285" fill="#ECF5FF" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">Alert or outage</text>
    <text x="96" y="322" fill="#A9C0D9" font-family="Arial, Helvetica, sans-serif" font-size="21">A production issue triggers</text>
    <text x="96" y="349" fill="#A9C0D9" font-family="Arial, Helvetica, sans-serif" font-size="21">the investigation flow.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="390" y="120" width="260" height="120" rx="22" fill="url(#card)" stroke="#3E6B91" stroke-width="2"/>
    <text x="416" y="158" fill="#67F0C1" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">2A. TELEMETRY ENRICHMENT</text>
    <text x="416" y="198" fill="#ECF5FF" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Logs, metrics, deploys</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="390" y="275" width="260" height="120" rx="22" fill="url(#card)" stroke="#3E6B91" stroke-width="2"/>
    <text x="416" y="313" fill="#67F0C1" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">2B. GITHUB ENRICHMENT</text>
    <text x="416" y="353" fill="#ECF5FF" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Commits, PRs, issues</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="390" y="430" width="260" height="120" rx="22" fill="url(#card)" stroke="#3E6B91" stroke-width="2"/>
    <text x="416" y="468" fill="#67F0C1" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">2C. RUNBOOK CONTEXT</text>
    <text x="416" y="508" fill="#ECF5FF" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Guidance and playbooks</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="720" y="240" width="320" height="200" rx="26" fill="url(#card)" stroke="#67F0C1" stroke-width="2.5"/>
    <rect x="752" y="268" width="140" height="8" rx="4" fill="url(#accent)"/>
    <text x="752" y="316" fill="#ECF5FF" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">Correlation engine</text>
    <text x="752" y="356" fill="#A9C0D9" font-family="Arial, Helvetica, sans-serif" font-size="22">Ranks suspects</text>
    <text x="752" y="388" fill="#A9C0D9" font-family="Arial, Helvetica, sans-serif" font-size="22">Builds incident timeline</text>
    <text x="752" y="420" fill="#A9C0D9" font-family="Arial, Helvetica, sans-serif" font-size="22">Generates structured brief</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1110" y="120" width="220" height="115" rx="22" fill="url(#card)" stroke="#3E6B91" stroke-width="2"/>
    <text x="1136" y="156" fill="#67F0C1" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">3A. OUTPUT</text>
    <text x="1136" y="197" fill="#ECF5FF" font-family="Arial, Helvetica, sans-serif" font-size="29" font-weight="700">Mitigation plan</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1110" y="270" width="220" height="115" rx="22" fill="url(#card)" stroke="#3E6B91" stroke-width="2"/>
    <text x="1136" y="306" fill="#67F0C1" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">3B. OUTPUT</text>
    <text x="1136" y="347" fill="#ECF5FF" font-family="Arial, Helvetica, sans-serif" font-size="29" font-weight="700">Rollback call</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1110" y="420" width="220" height="165" rx="22" fill="url(#card)" stroke="#74B9FF" stroke-width="2.5"/>
    <text x="1136" y="458" fill="#67F0C1" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">4. COPILOT LAYER</text>
    <text x="1136" y="500" fill="#ECF5FF" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">GitHub Copilot CLI</text>
    <text x="1136" y="536" fill="#A9C0D9" font-family="Arial, Helvetica, sans-serif" font-size="21">Receives the incident brief</text>
    <text x="1136" y="564" fill="#A9C0D9" font-family="Arial, Helvetica, sans-serif" font-size="21">and performs the final</text>
    <text x="1136" y="592" fill="#A9C0D9" font-family="Arial, Helvetica, sans-serif" font-size="21">reasoning handoff.</text>
  </g>

  <path d="M320 285H360C375 285 390 235 390 180" stroke="#82DAF3" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M320 285H350C370 285 390 320 390 335" stroke="#82DAF3" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M320 285H350C370 285 390 475 390 490" stroke="#82DAF3" stroke-width="4" marker-end="url(#arrow)"/>

  <path d="M650 180H700C710 180 720 265 720 300" stroke="#82DAF3" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M650 335H700C710 335 720 340 720 340" stroke="#82DAF3" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M650 490H700C710 490 720 420 720 390" stroke="#82DAF3" stroke-width="4" marker-end="url(#arrow)"/>

  <path d="M1040 290H1080C1090 290 1110 200 1110 178" stroke="#82DAF3" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1040 330H1080C1090 330 1110 330 1110 327" stroke="#82DAF3" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1040 375H1080C1092 375 1110 470 1110 500" stroke="#82DAF3" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="72" y="694" fill="#9CB7D3" font-family="Arial, Helvetica, sans-serif" font-size="22">Core idea: Copilot SRE assembles operational context before Copilot CLI reasons over it, which is why it feels different from a plain dashboard or chat tool.</text>
</svg>
